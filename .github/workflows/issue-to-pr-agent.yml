name: Issue-to-PR AI Agent

on:
  issues:
    types: [opened, labeled]

jobs:
  develop:
    if: contains(github.event.issue.labels.*.name, 'aider')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Aider
        run: pip install aider-chat

      - name: Run Aider Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          aider --config .agent-config.yml --message "Process Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}\\n\\n${{ github.event.issue.body }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: "ai/issue-${{ github.event.issue.number }}"
          title: "AI: Resolves #${{ github.event.issue.number }}"
          body: "Automatically generated by AI Agent for Issue #${{ github.event.issue.number }}."
          commit-message: "feat: address issue #${{ github.event.issue.number }}"
